<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoppBud — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #1565C0;
      --primary-dark:  #0D47A1;
      --primary-light: #E3F2FD;
      --danger:        #C62828;
      --bg:            #F0F4F8;
      --card:          #FFFFFF;
      --border:        #DEE4EC;
      --text:          #1A202C;
      --muted:         #64748B;
      --radius:        10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .login-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    .login-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .login-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .login-header p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .login-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
    .field input {
      padding: 0.6rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 0.65rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.25rem;
    }
    .btn-submit:hover { background: var(--primary-dark); }

    .erro-msg {
      background: #FFF1F2;
      color: #B91C1C;
      border: 1px solid #FECDD3;
      border-radius: 7px;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  <h1>ShoppBud — Importação por Cupom</h1>
</header>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-header">
      <h2>Acesso restrito</h2>
      <p>Insira suas credenciais para continuar.</p>
    </div>
    <form class="login-body" method="POST" action="/login">
      {{if .Erro}}
      <div class="erro-msg">Usuário ou senha incorretos.</div>
      {{end}}
      <div class="field">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn-submit" type="submit">Entrar</button>
    </form>
  </div>
</div>

</body>
</html>
